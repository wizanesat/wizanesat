<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الاشتراك</title>

<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #222;
  --primary: #4f46e5;
  --border: #ddd;
}

body.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --primary: #6366f1;
  --border: #334155;
}

body {
  margin: 0;
  font-family: "Cairo", Arial;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  transition: 0.3s;
}

/* زر الوضع الداكن */
.toggle {
  position: absolute;
  top: 15px;
  left: 15px;
  cursor: pointer;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 8px;
}

/* العنوان */
h2 {
  margin-top: 60px;
  font-size: 28px;
}

/* البطاقات */
.plans {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 800px;
  margin: 30px auto;
  padding: 0 15px;
}

.card {
  background: var(--card);
  padding: 25px;
  border-radius: 15px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-5px);
}

.card.active {
  border: 2px solid var(--primary);
  background: rgba(79,70,229,0.08);
}

.price {
  font-size: 24px;
  font-weight: bold;
  margin-top: 10px;
  color: var(--primary);
}

/* الفورم */
.form {
  margin-top: 30px;
}

input {
  width: 280px;
  max-width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
}

/* الزر */
button {
  margin-top: 20px;
  padding: 14px 30px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<h2>اختر اشتراكك</h2>

<div class="plans">
  <div class="card" data-price="400">شهر<div class="price">400 دج</div></div>
  <div class="card" data-price="900">3 أشهر<div class="price">900 دج</div></div>
  <div class="card" data-price="1500">6 أشهر<div class="price">1500 دج</div></div>
  <div class="card" data-price="2500">12 شهر<div class="price">2500 دج</div></div>
</div>

<div class="form">
  <input type="text" id="phone" placeholder="رقم الهاتف">
  <br>
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <br>
  <button id="payBtn" disabled>ادفع الآن</button>
</div>

<script>
const cards = document.querySelectorAll(".card");
const phone = document.getElementById("phone");
const email = document.getElementById("email");
const btn = document.getElementById("payBtn");

let selectedPrice = null;

// اختيار الاشتراك
cards.forEach(card => {
  card.addEventListener("click", () => {
    cards.forEach(c => c.classList.remove("active"));
    card.classList.add("active");
    selectedPrice = card.dataset.price;
    validate();
  });
});

// التحقق
function validate() {
  btn.disabled = !(selectedPrice && phone.value && email.value);
}

phone.addEventListener("input", validate);
email.addEventListener("input", validate);

// الوضع الداكن
function toggleDark() {
  document.body.classList.toggle("dark");
}

// الدفع
btn.addEventListener("click", async () => {
  btn.disabled = true;
  btn.innerText = "⏳ جارٍ المعالجة...";

  try {
    const res = await fetch("https://dz-card-payment.wizanecod.workers.dev/create-order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount: parseInt(selectedPrice),
        phone: phone.value,
        email: email.value
      })
    });

    const data = await res.json();

    if (data.checkout_url) {
      window.location.href = data.checkout_url;
    } else {
      throw new Error();
    }

  } catch {
    btn.innerText = "ادفع الآن";
    btn.disabled = false;
    alert("حدث خطأ، حاول مرة أخرى");
  }
});
</script>

</body>
</html>
