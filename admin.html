<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن | Neo 4K Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f19;
            --card: #161d2f;
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f1f5f9;
            --border: #2d3748;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: auto; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 14px; opacity: 0.7; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: 800; color: var(--primary); }

        /* Table Style */
        .orders-table-wrapper { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        .status-badge { padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: bold; }
        .pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .success { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .action-btn { 
            padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; 
            font-family: inherit; font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .btn-complete { background: var(--success); color: white; margin-left: 5px; }
        .btn-delete { background: var(--danger); color: white; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    </style>
</head>
<body id="adminBody" style="display: none;" >

<div class="admin-container">
    <header>
        <h1>لوحة الإدارة 🔐</h1>
        <button onclick="window.location.href='index.html'" class="action-btn" style="background: var(--border); color: white;">العودة للموقع</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><h3>إجمالي الطلبات</h3><p id="totalOrders">0</p></div>
        <div class="stat-card"><h3>بانتظار الدفع</h3><p id="pendingOrders" style="color: var(--warning)">0</p></div>
        <div class="stat-card"><h3>إجمالي الأرباح</h3><p id="totalRevenue">0 دج</p></div>
    </div>

    <div class="orders-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>العميل</th>
                    <th>الهاتف</th>
                    <th>الخطة</th>
                    <th>المبلغ</th>
                    <th>الحالة</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="adminOrdersBody">
                </tbody>
        </table>
    </div>
</div>

<script type="module">

import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth = getAuth(app);
const ADMIN_EMAIL = wizanesat@gmail.com"; // ⚠️ ضع إيميلك هنا بدقة

// دالة تسجيل الخروج
window.handleLogout = () => {
    signOut(auth).then(() => window.location.href = 'index.html');
};

// الحارس الأمني (Auth Guard)
onAuthStateChanged(auth, (user) => {
    if (!user) {
        // 1. إذا لم يسجل الدخول، وجهه فوراً لصفحة الدخول
        console.log("غير مسجل دخول، جاري التوجيه...");
        window.location.href = 'index.html?error=unauthorized'; 
    } 
    else if (user.email !== ADMIN_EMAIL) {
        // 2. إذا سجل دخول بإيميل آخر، امنعه واطرده للموقع الرئيسي
        alert("ليس لديك صلاحية الوصول لهذه المنطقة!");
        window.location.href = 'index.html';
    } 
    else {
        // 3. إذا كان هو الأدمن، أظهر محتوى الصفحة وابدأ جلب البيانات
        document.getElementById('adminBody').style.display = 'block';
        document.getElementById('adminInfo').innerText = `متصل كـ: ${user.email}`;
        loadAdminData(); // استدعاء دالة جلب البيانات من Firestore
    }
});

    
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth = getAuth(app);
const ADMIN_EMAIL = "wizanesat@gmail.com"; // استبدله بإيميلك الحقيقي

// فحص الصلاحيات فوراً
onAuthStateChanged(auth, (user) => {
    if (!user) {
        // إذا لم يسجل دخوله أصلاً
        alert("يجب تسجيل الدخول للوصول لهذه الصفحة");
        window.location.href = 'index.html'; 
    } else if (user.email !== ADMIN_EMAIL) {
        // إذا سجل دخوله بإيميل ليس للأدمن
        alert("عذراً، لا تملك صلاحية الوصول للأدمن");
        window.location.href = 'index.html';
    } else {
        // المستخدم هو الأدمن، ابدأ بجلب البيانات
        loadAdminData();
    }
});
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- ضع إعدادات Firebase الخاصة بك هنا ---
    const firebaseConfig = {
  apiKey: "AIzaSyA...",
  authDomain: "your-project-id.firebaseapp.com",
  projectId: "your-project-id",
  storageBucket: "your-project-id.appspot.com",
  messagingSenderId: "123456789...",
  appId: "1:123456789:web:abcdef..."
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة جلب البيانات وتحديث الإحصائيات
    function loadAdminData() {
        const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('adminOrdersBody');
            tbody.innerHTML = '';
            
            let total = 0, pending = 0, revenue = 0;

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const id = docSnap.id;
                
                // حساب الإحصائيات
                total++;
                if(order.status === 'pending') pending++;
                if(order.status === 'success') revenue += parseInt(order.amount);

                // بناء صفوف الجدول
                const date = order.timestamp ? order.timestamp.toDate().toLocaleDateString('ar-DZ') : '...';
                tbody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td>${order.customerName || 'بدون اسم'}</td>
                        <td>${order.phone}</td>
                        <td>${order.plan}</td>
                        <td>${order.amount} دج</td>
                        <td><span class="status-badge ${order.status === 'success' ? 'success' : 'pending'}">${order.status === 'success' ? 'مكتمل' : 'قيد الانتظار'}</span></td>
                        <td>
                            ${order.status === 'pending' ? `<button onclick="updateStatus('${id}', 'success')" class="action-btn btn-complete">تأكيد</button>` : ''}
                            <button onclick="deleteOrder('${id}')" class="action-btn btn-delete"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalOrders').innerText = total;
            document.getElementById('pendingOrders').innerText = pending;
            document.getElementById('totalRevenue').innerText = revenue + " دج";
        });
    }

    // وظيفة تحديث الحالة
    window.updateStatus = async (id, newStatus) => {
        if(confirm("هل تريد تأكيد استلام الدفع لهذا الطلب؟")) {
            await updateDoc(doc(db, "orders", id), { status: newStatus });
        }
    };

    // وظيفة حذف طلب
    window.deleteOrder = async (id) => {
        if(confirm("هل أنت متأكد من حذف هذا الطلب نهائياً؟")) {
            await deleteDoc(doc(db, "orders", id));
        }
    };

    loadAdminData();
</script>
</body>
</html>
